<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>(function(){var t=localStorage.getItem('theme');if(t==='dark'||t==='light')document.documentElement.setAttribute('data-theme',t);})()</script>
  <title>John Chandler Burnham - $title$</title>
  <link rel="stylesheet" href="/css/tufte.css"/>
  <link rel="stylesheet" href="/css/syntax.css"/>
  <link rel="stylesheet" href="/css/custom.css"/>
  <script id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <header>
    <nav>
      <a href="/">posts</a>
      <a href="/about.html">about</a>
      <a href="/projects.html">projects</a>
      <a href="https://github.com/johnchandlerburnham">github</a>
      <a href="https://bsky.app/profile/johnchandlerburnham.com">bluesky</a>
      <a href="#" id="theme-toggle" aria-label="Toggle dark mode">auto</a>
    </nav>
  </header>
  <article>
    <h1>$title$</h1>
    <section>
      $body$
    </section>
  </article>
  <footer>
    <p>&copy; <script>document.write(new Date().getFullYear());</script>
       John Chandler Burnham.
      Generated by <a href="http://jaspervdj.be/hakyll">Hakyll</a>
    </p>
  </footer>
  <script>
  (function(){
    var btn=document.getElementById('theme-toggle');
    var states=['auto','light','dark'];
    function current(){return localStorage.getItem('theme')||'auto';}
    function apply(theme){
      if(theme==='auto'){
        document.documentElement.removeAttribute('data-theme');
        localStorage.removeItem('theme');
      }else{
        document.documentElement.setAttribute('data-theme',theme);
        localStorage.setItem('theme',theme);
      }
      btn.textContent=theme;
    }
    btn.addEventListener('click',function(e){
      e.preventDefault();
      var i=states.indexOf(current());
      apply(states[(i+1)%3]);
    });
    btn.textContent=current();
  })();
  </script>
</body>
</html>
